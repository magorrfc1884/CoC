<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Code of Conduct</title>
    <style>
        body {
            background-color: #222;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Bypasses security by using a standard embedded view with a clean layout */
        .viewer-box {
            width: 90vw;
            height: 90vh;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="viewer-box">
        <!-- Using Google's secure embedded viewer wrapper to force the book layout safely -->
        <iframe src="https://docs.google.com/gview?url=https://magorrfc1884.github.io/CoC/Club_Code_of_Conduct_Fair_Play_Policy.pdf&embedded=true"></iframe>
    </div>

</body>
</html>
