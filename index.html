<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Document Viewer</title>
    
    <!-- Corrected DearFlip CSS CDN Paths -->
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        #flipbook-container {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <!-- The Flipbook Container -->
    <!-- CRITICAL: Change "your-file.pdf" to your exact filename -->
    <div id="flipbook-container" class="_df_book" source="Club Code of Conduct _ Fair Play Policy.pdf"></div>

    <!-- Core Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

</body>
</html>
