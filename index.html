<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Uses the browser's high-performance native engine */
        .viewer-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Standard high-compatibility object embed -->
    <!-- CRITICAL: Change "your-file.pdf" to your exact file name (e.g. programme.pdf) -->
    <object class="viewer-frame" data="Club Code of Conduct _ Fair Play Policy.pdf" type="application/pdf">
        <embed src="your-file.pdf" type="application/pdf" />
    </object>

</body>
</html>
