<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flipbook</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #222;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <!-- Load jQuery and the HTML5 3D FlipBook Engine -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/flip-book/js/flipbook.min.js"></script>

   <script>
        $(document).ready(function () {
            $("#container").flipBook({
                // Using the full URL bypasses the relative path lock
                pdf: "https://magorrfc1884.github.io/coc/Club_Code_of_Conduct_Fair_Play_Policy.pdf",
                template: {
                    view: "book",
                    theme: "dark"
                }
            });
        });
    </script>

</body>
</html>
