<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Document Viewer</title>
    
    <!-- Include DearFlip CSS Stylesheets via Production CDN -->
    <link href="https://cdn.jsdelivr.net/npm/flip-book@1.9.9/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/flip-book@1.9.9/css/themify-icons.min.css" rel="stylesheet" type="text/css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        /* Style the container to fill the whole browser screen */
        #flipbook-container {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <!-- The Flipbook Container -->
    <!-- REPLACE "your-file.pdf" with the exact file name of your uploaded PDF -->
    <div id="flipbook-container" class="_df_book" source="your-file.pdf"></div>

    <!-- Include jQuery and DearFlip Core JS Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flip-book@1.9.9/js/dflip.min.js"></script>

</body>
</html>
