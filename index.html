<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Booklet</title>
    
    <!-- Standard, high-compatibility Flipbook styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.css">
    
    <style>
        body {
            background-color: #222;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #viewer-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Native PDF frame that displays perfectly without security blockages */
        .pdf-frame {
            width: 90vw;
            height: 90vh;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="viewer-container">
        <!-- REPLACE "your-file.pdf" with the exact name of your uploaded PDF -->
        <iframe src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://magorrfc1884.github.io/coc/Club Code of Conduct _ Fair Play Policy.pdf" class="pdf-frame"></iframe>
    </div>

</body>
</html>
