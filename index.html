<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Policy Flipbook</title>
    
    <!-- Using a secure, high-compatibility layout frame -->
    <style>
        body {
            background-color: #1e1e1e;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .flipbook-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 95vw;
            height: 90vh;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="flipbook-wrapper">
        <!-- Using PDF.js built-in presentation engine -->
        <iframe src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://magorrfc1884.github.io/CoC/Club_Code_of_Conduct_Fair_Play_Policy.pdf#page=1&view=FitH"></iframe>
    </div>

</body>
</html>

    <div class="viewer-box">
        <!-- Using Google's secure embedded viewer wrapper to force the book layout safely -->
        <iframe src="https://docs.google.com/gview?url=https://magorrfc1884.github.io/CoC/Club_Code_of_Conduct_Fair_Play_Policy.pdf&embedded=true"></iframe>
    </div>

</body>
</html>
